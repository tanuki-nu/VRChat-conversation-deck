<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>テキスト駆動HTMLビューア</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      margin: 0;
      padding: 2rem;
      background-image: url('https://drive.google.com/thumbnail?id=1lib1hz_wcIWRTFGsT61Ipkj9xR-beQ4s&sz=w1920');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .main-container {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 3rem;
      max-width: 1000px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
      border: none;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    header h1 {
      margin: 0 0 0.75rem;
      font-size: 2.2rem;
      color: #222;
    }

    .muted-meta {
      color: #555;
      font-size: 0.95rem;
    }

    #toc {
      margin-bottom: 3rem;
      padding: 1.5rem 2rem;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 16px;
    }

    #toc h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #333;
      border-bottom: 2px solid #CCCCFF;
      display: inline-block;
      padding-bottom: 0.2rem;
      margin-bottom: 1rem;
    }

    #toc ul {
      margin: 0;
      padding-left: 1.5rem;
      list-style-type: circle;
    }

    #toc li {
      margin: 0.4rem 0;
    }

    #toc a {
      color: #3366CC;
      text-decoration: none;
      font-weight: 500;
    }

    #toc a:hover {
      text-decoration: underline;
    }

    #content {
      color: #222;
      font-size: 1.05rem;
    }

    .section-heading {
      font-weight: bold;
      font-size: 1.6rem;
      margin: 3.5rem 0 1.5rem;
      position: relative;
      padding-bottom: 0.6rem;
      color: #111;
    }

    .section-heading::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 80px;
      height: 5px;
      background: #CCCCFF;
      border-radius: 99px;
    }

    .related-questions {
      margin: 2rem 0;
      padding: 1.2rem 1.5rem;
      background: rgba(204, 204, 255, 0.2);
      border-radius: 12px;
      border-left: 6px solid #CCCCFF;
    }

    .related-questions-title {
      font-weight: bold;
      margin-bottom: 0.6rem;
      color: #444;
      font-size: 1rem;
    }

    .related-questions ul {
      margin: 0;
      padding-left: 1.5rem;
    }

    .related-questions li {
      margin: 0.4rem 0;
      cursor: pointer;
      color: #5555AA;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .related-questions li:hover {
      color: #333388;
    }

    .anchor-text {
      font-weight: 500;
      color: #333;
    }

    p {
      margin: 1.2rem 0;
    }

    pre.raw-text {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.2);
      padding: 1rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <header>
      <h1>テキスト駆動ページ</h1>
      <div class="muted-meta">
        このページは <code>text_file = "<span id="file-name">text_context_template.txt</span>"</code> を前提として、
        txtファイルの記号パターンからHTMLを自動生成します。
      </div>
    </header>

    <section id="toc">
      <h2>目次</h2>
      <ul id="toc-list"></ul>
    </section>

    <main id="content">
      読み込み中…
    </main>
  </div>

  <script>
    const text_file = "text_context_template.txt";
    document.getElementById("file-name").textContent = text_file;

    const vectorAnchors = [];

    // ベクトル値をパース
    function parseVector(str) {
      if (!str) return null;
      const m = str.match(/<vector:\s*([^>]+)\s*>/i);
      if (!m) return null;
      const parts = m[1].split(',').map(s => parseFloat(s.trim()));
      return parts.every(n => !isNaN(n)) ? parts : null;
    }

    // ユークリッド距離を計算
    function calculateDistance(v1, v2) {
      if (!v1 || !v2) return Infinity;
      const len = Math.max(v1.length, v2.length);
      let sum = 0;
      for (let i = 0; i < len; i++) {
        const a = v1[i] || 0;
        const b = v2[i] || 0;
        sum += Math.pow(a - b, 2);
      }
      return Math.sqrt(sum);
    }

    function findSimilarAnchors(baseId, baseVector, limit = 3) {
      if (!baseVector) return [];
      const others = vectorAnchors.filter(a => a.id !== baseId && a.vector !== null);
      others.sort((a, b) => calculateDistance(a.vector, baseVector) - calculateDistance(b.vector, baseVector));
      return others.slice(0, limit);
    }

    function renderFromText(rawText) {
      const contentEl = document.getElementById("content");
      const tocListEl = document.getElementById("toc-list");
      contentEl.innerHTML = "";
      tocListEl.innerHTML = "";
      vectorAnchors.length = 0;

      rawText = rawText.replace(/-start-[\s\S]*?-end-/g, "").trim();
      const lines = rawText.split(/\r?\n/);
      
      // 1次スキャン：行ごとのアンカー情報収集
      lines.forEach((line, lineIndex) => {
        const trimmed = line.trim();
        if (!trimmed) return;

        // 行内の ^...^ を全て抽出
        const anchorMatches = Array.from(line.matchAll(/\^+(.*?)\^+/g));
        // 行内の <vector:...> を全て抽出
        const vectorMatches = Array.from(line.matchAll(/<vector:\s*([^>]+)\s*>/gi));

        anchorMatches.forEach((match, i) => {
          const displayText = match[1].trim();
          const id = `vec-${vectorAnchors.length + 1}`;
          // 同じインデックスのベクトルタグがあれば紐付ける
          const vectorStr = vectorMatches[i] ? vectorMatches[i][0] : null;
          const vector = parseVector(vectorStr);
          
          vectorAnchors.push({ 
            id, 
            vector, 
            displayText, 
            indexInText: lineIndex,
            rawMatch: match[0]
          });
        });
      });

      let htmlParts = [];
      let sectionCount = 0;
      let anchorPointer = 0;

      // 2次スキャン：HTML組み立て
      lines.forEach((line, lineIndex) => {
        let processed = line.trim();
        if (!processed) return;

        // セクションタイトル
        if (/^~+[^~]+~+$/.test(processed)) {
          const title = processed.replace(/~+/g, "").trim();
          sectionCount++;
          const id = `section-${sectionCount}`;
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = `#${id}`;
          a.textContent = title;
          li.appendChild(a);
          tocListEl.appendChild(li);
          htmlParts.push(`<div class="section-heading" id="${id}">${title}</div>`);
          return;
        }

        // アンカーテキスト置換
        processed = line.replace(/\^+(.*?)\^+/g, (match) => {
          const anchor = vectorAnchors.find(a => a.indexInText === lineIndex && a.rawMatch === match);
          return anchor ? `<span class="anchor-text" id="${anchor.id}">${anchor.displayText}</span>` : match;
        });

        // 関連質問
        if (processed.includes("<appropriate-behavior>")) {
          const lastAnchor = [...vectorAnchors].reverse().find(a => a.indexInText <= lineIndex);
          const baseId = lastAnchor ? lastAnchor.id : null;
          const baseVector = lastAnchor ? lastAnchor.vector : null;
          const similars = findSimilarAnchors(baseId, baseVector, 3);

          let block = `<div class="related-questions">`;
          block += `<div class="related-questions-title">関連する質問</div>`;
          if (similars.length === 0) {
            block += `<div class="muted-meta">関連質問はまだありません。</div>`;
          } else {
            block += `<ul>`;
            similars.forEach(s => {
              block += `<li data-target="${s.id}">${s.displayText}</li>`;
            });
            block += `</ul>`;
          }
          block += `</div>`;
          processed = processed.replace("<appropriate-behavior>", block);
        }

        // クリーンアップ
        processed = processed.replace("<paragraph>", "").trim();
        processed = processed.replace(/<vector:.*?>/g, "");

        if (processed.length > 0) {
          htmlParts.push(`<p>${processed}</p>`);
        }
      });

      contentEl.innerHTML = htmlParts.length === 0 ? `<pre class="raw-text">${rawText}</pre>` : htmlParts.join("\n");

      contentEl.querySelectorAll(".related-questions li[data-target]").forEach(li => {
        li.addEventListener("click", () => {
          const target = document.getElementById(li.getAttribute("data-target"));
          if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
        });
      });
    }

    fetch(text_file)
      .then(res => res.ok ? res.text() : Promise.reject("読み込み失敗"))
      .then(text => renderFromText(text))
      .catch(err => {
        document.getElementById("content").innerHTML = `<div style="color:#c00; padding: 2rem; text-align: center;">読み込みエラー: ${err}</div>`;
      });
  </script>
</body>
</html>
